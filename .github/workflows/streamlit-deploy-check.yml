# Sanity-check on every push to main — Streamlit Cloud auto-deploys from the repo.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -c "import agent, tools, guardrails, db; print('imports ok')"
